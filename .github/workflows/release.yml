name: Release Resource Pack

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -L -o oxipng.tar.gz https://github.com/shssoichiro/oxipng/releases/download/v9.1.2/oxipng-9.1.2-x86_64-unknown-linux-musl.tar.gz
          tar -xzf oxipng.tar.gz
          sudo mv oxipng-9.1.2-x86_64-unknown-linux-musl/oxipng /usr/local/bin/oxipng

      - name: Determine next version
        id: version
        run: |
          latest=$(gh release list --limit 100 --json tagName --jq '.[].tagName' | grep -E '^v[0-9]+$' | sed 's/v//' | sort -n | tail -1)
          if [ -z "$latest" ]; then
            next=1
          else
            next=$((latest + 1))
          fi
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Stage package contents
        run: |
          mkdir -p package
          cp resourcepack/LICENSE.txt package/
          cp resourcepack/pack.mcmeta package/
          cp -r resourcepack/assets package/

      - name: Minify JSON
        run: |
          find package -name '*.json' -print0 | while IFS= read -r -d '' f; do
            jq -c . "$f" > "$f.min" && mv "$f.min" "$f"
          done

      - name: Optimize PNGs (lossless)
        run: |
          find package -name '*.png' -print0 | xargs -0 -r oxipng -o max --strip safe

      - name: Create zip
        run: |
          cd package
          zip -r ../anion-resourcepack-${{ steps.version.outputs.tag }}.zip LICENSE.txt pack.mcmeta assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "anion-resourcepack-${{ steps.version.outputs.tag }}.zip" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
